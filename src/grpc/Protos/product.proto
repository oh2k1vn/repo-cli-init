syntax = "proto3";

option csharp_namespace = "OptiFlowSVC.Grpc.Protos";

import "Protos/common.proto";
import "google/protobuf/timestamp.proto";

package product;

service ProductService {
  rpc GetProductsByQuery (common.CommonQuery) returns (ProductDataSourceResponse);
  rpc GetProductDetail (common.GetBySlugRequest) returns (ProductResponseWrapped);
  rpc GetProductsByProductGroupSlug (common.GetBySlugPagedRequest) returns (ProductDataSourceResponse);
  
  rpc GetProductGroupsBySlug (common.GetBySlugRequest) returns (ProductGroupResponseWrapped);
  rpc GetProductGroupsByQuery (common.CommonQuery) returns (ProductGroupDataSourceResponse);
}


message ProductResponseWrapped {
  bool success = 1;
  string message = 2;
  ProductResponse data = 3;
}

message ProductDataSourceResponse {
  common.CommonDataSourceMeta meta = 1;
  repeated ProductResponse data = 2;
}

message ProductGroupResponseWrapped {
  bool success = 1;
  string message = 2;
  ProductGroupResponse data = 3;
}

message ProductGroupDataSourceResponse {
  common.CommonDataSourceMeta meta = 1;
  repeated ProductGroupResponse data = 2;
}

message ProductVariantResponse {
  string id = 1;
  string sku = 2;
  string barcode = 3;
  double price = 4;
  double compare_price = 5;
  int32 stock = 6;
  string attributes_name1 = 7;
  string attributes_value1 = 8;
  string attributes_name2 = 9;
  string attributes_value2 = 10;
  string attributes_name3 = 11;
  string attributes_value3 = 12;
  string image = 13;
  string product_sku = 14;
  string product_id = 15;
  string variant_name = 16;
}

message ProductVariantConfigResponse {
  string name = 1;
  repeated string values = 2;
}

message ProductResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock = 5;
  string category_id = 6;
  string category_name = 7;
  bool is_active = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  string img_url = 11;
  string slug = 12;
  repeated string image_urls = 13;
  string sku = 14;
  string barcode = 15;
  string classify = 16;
  double compare_price = 17;
  double weight = 18;
  bool tax_included = 19;
  bool track_inventory = 20;
  string brand = 21;
  string product_spec = 22;
  reserved 23, 24, 25;
  repeated ProductVariantResponse variants = 26;
  repeated ProductVariantConfigResponse variant_config = 27;
  string org_id = 28;
  string created_by = 29;
  string updated_by = 30;
  map<string, string> extend_object = 31;
}

message ProductGroupResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string image = 5;
  string group_by = 6;
  string operator = 7;
  string status = 8;
  repeated string product_ids = 9;
  repeated ProductResponse products = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  string org_id = 13;
  string created_by = 14;
  string updated_by = 15;
  map<string, string> extend_object = 16;
}

