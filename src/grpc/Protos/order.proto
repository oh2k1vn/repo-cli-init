syntax = "proto3";

option csharp_namespace = "OptiFlowSVC.Grpc.Protos";

package order;

import "Protos/common.proto";

service OrderService {
  rpc PlaceOrder (PlaceOrderRequest) returns (common.OperationResult);
  rpc GetMyOrders (common.CommonQuery) returns (GetOrdersResponse);
  rpc GetOrderDetail (GetOrderRequest) returns (OrderDetailResponse);
  rpc CancelOrder (CancelOrderRequest) returns (common.OperationResult);
  rpc GetOrderTracking (GetOrderRequest) returns (GetOrderTrackingResponse);
  rpc RequestRefund (RequestRefundRequest) returns (common.OperationResult);
  rpc SubmitReview (SubmitReviewRequest) returns (common.OperationResult);
}

message PlaceOrderRequest {
  string customer_name = 1;
  string email = 2;
  string phone = 3;
  string shipping_address = 4;
  string payment_method = 5;
  string note = 6;
  string session_id = 7;
  repeated OrderItemInput items = 10;
  string voucher_code = 11;
  double shipping_fee = 12;
  string shipping_carrier_pref = 13;
}

message OrderItemInput {
  string product_id = 1;
  string variant_id = 2;
  int32 qty = 3;
}

message GetOrdersResponse {
  bool success = 1;
  string message = 2;
  int32 total = 3;
  repeated OrderResponse data = 4;
}

message OrderResponse {
  string id = 1;
  string order_code = 2;
  string customer_name = 3;
  string email = 4;
  string phone = 5;
  string status = 6;
  string payment_status = 7;
  double total_amount = 8;
  int64 created_at = 9;
  string shipping_address = 10;
  string shipping_carrier = 11;
  string tracking_code = 12;
  int64 estimated_delivery_from = 13;
  int64 estimated_delivery_to = 14;
  int64 shipped_at = 15;
  int64 delivered_at = 16;
  
  // TIKTOK STYLE FIELDS
  string shop_name = 17;
  string payment_method_label = 18;
  string payment_method_logo = 19;
  double shipping_fee = 20;
  double discount_amount = 21;
  double original_total_amount = 22;
  int64 paid_at = 23;
  string shop_logo_url = 24;
  string status_label = 25;
  string status_emoji = 26;
  string shop_id = 27;
  int64 expected_delivery_date = 28;
  string payment_method = 29;
  string note = 30;
  string voucher_code = 31;
  string cancel_reason = 32;
  string cancelled_by = 33;
  int64 cancelled_at = 34;
  string tracking_url = 35;
  double tax_amount = 36;
}

message CancelOrderRequest {
  string order_code = 1;
  string reason = 2;
  string session_id = 3;
}

message GetOrderRequest {
  string slug = 1;
  string session_id = 2;
}

message GetOrderTrackingResponse {
  bool success = 1;
  string tracking_code = 2;
  string carrier = 3;
  string carrier_url = 4;
  int64 estimated_from = 5;
  int64 estimated_to = 6;
  repeated TrackingEvent events = 7;
  string message = 8;
}

message TrackingEvent {
  int64 event_time = 1;
  string location = 2;
  string description = 3;
  string status = 4;
  bool is_current = 5;
}

message OrderDetailResponse {
  bool success = 1;
  string message = 2;
  OrderResponse order = 3;
  repeated OrderItemResponse items = 4;
}

message OrderItemResponse {
  string product_name = 1;
  string variant_name = 2;
  double price = 3;
  int32 qty = 4;
  string image_url = 5;
  double sub_total = 6;
}

message RequestRefundRequest {
  string order_code = 1;
  string reason = 2;
  string refund_type = 3; // "Refund" | "ReturnRefund"
  double amount = 4;
  repeated string evidence_urls = 5;
  string session_id = 6;
}

message SubmitReviewRequest {
  string order_id = 1;
  string order_item_id = 2;
  int32 rating = 3;
  string comment = 4;
  repeated string media_urls = 5;
  bool is_anonymous = 6;
  string session_id = 7;
}
